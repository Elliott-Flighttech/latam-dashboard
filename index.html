const parseCSV = (text) => {
  const lines = text.split("\n").filter((l) => l.trim());
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map((h) => h.trim().replace(/^"|"$/g, ""));
  return lines.slice(1).map((line) => {
    const values = [];
    let current = "";
    let inQuotes = false;
    for (const ch of line) {
      if (ch === '"') { inQuotes = !inQuotes; }
      else if (ch === "," && !inQuotes) { values.push(current.trim()); current = ""; }
      else { current += ch; }
    }
    values.push(current.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (values[i] || "").replace(/^"|"$/g, ""); });
    return obj;
  }).filter((row) => row.tail_number && row.arrival_date);
};

const getWeekRange = (dateStr) => {
  const d = new Date(dateStr + "T12:00:00");
  const day = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - ((day + 6) % 7));
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  return { start: mon.toISOString().slice(0, 10), end: sun.toISOString().slice(0, 10) };
};
const getMonthRange = (dateStr) => {
  const d = new Date(dateStr + "T12:00:00");
  return { start: new Date(d.getFullYear(), d.getMonth(), 1).toISOString().slice(0,10), end: new Date(d.getFullYear(), d.getMonth()+1, 0).toISOString().slice(0,10) };
};
const getDatesInRange = (start, end) => {
  const dates = []; let cur = new Date(start + "T12:00:00"); const last = new Date(end + "T12:00:00");

function StatusBadge({flight}) {
  const now = new Date();
  const arr = new Date(flight.arrivalDate + "T" + flight.arrivalTime);
  const dep = new Date((flight.departureDate||flight.arrivalDate) + "T" + flight.departureTime);
  let label="Scheduled", color="#8892a4", bg="rgba(136,146,164,0.1)";
  if(now>=arr&&now<=dep){label="On Bay";color="#10B981";bg="rgba(16,185,129,0.15)";}
  else if(now>dep){label="Completed";color="#6366F1";bg="rgba(99,102,241,0.15)";}
  return <span style={{fontSize:11,fontWeight:600,padding:"3px 10px",borderRadius:20,color,background:bg,whiteSpace:"nowrap"}}>{label}</span>;
}

  return <>

      <Field label="Code"><input value={newClient.short} onChange={e=>setNewClient(p=>({...p,short:e.target.value.toUpperCase()}))} placeholder="XYZ" maxLength={4} style={{...inputStyle,width:70,padding:"8px 12px"}}/></Field>
      <div style={{display:"flex",gap:3,paddingBottom:16}}>{COLORS.slice(0,5).map(col=><div key={col} onClick={()=>setNewClient(p=>({...p,color:col}))} style={{width:22,height:22,borderRadius:"50%",background:col,cursor:"pointer",border:newClient.color===col?"2px solid #fff":"2px solid transparent"}}/>)}</div>
      <button onClick={addClient} style={{...btnPrimary,padding:"8px 16px",marginBottom:16,whiteSpace:"nowrap"}}>+ Add</button>
    </div>
  </div>;
}

function SheetsConfigPanel({config,clients,onSave,onSync,onCancel}) {
  const [sheetId,setSheetId]=useState(config?.sheetId||"");
  const [tabs,setTabs]=useState(config?.tabs||clients.map((c,i)=>({gid:"",clientId:c.id,name:c.name})));
  const extractSheetId=(input)=>{const m=input.match(/\/d\/([a-zA-Z0-9_-]+)/);return m?m[1]:input.trim();};
  const updateTab=(idx,field,value)=>setTabs(p=>p.map((t,i)=>i===idx?{...t,[field]:value}:t));
  const handleSave=()=>{const cfg={sheetId:extractSheetId(sheetId),tabs:tabs.filter(t=>t.gid!=="")};onSave(cfg);};
  const handleSync=()=>{const cfg={sheetId:extractSheetId(sheetId),tabs:tabs.filter(t=>t.gid!=="")};onSync(cfg);};
  const infoStyle={fontSize:12,color:"#8892a4",lineHeight:1.6,marginBottom:16};
  const codeStyle={background:"rgba(255,255,255,0.06)",padding:"2px 6px",borderRadius:4,fontFamily:"'JetBrains Mono', monospace",fontSize:11,color:"#0EA5E9"};
  return <div>
    <div style={infoStyle}><strong style={{color:"#f0f4f8"}}>Steps to connect:</strong><br/>
    1. Upload the Excel template to Google Drive → Abrir como Google Sheets<br/>
    2. In the Sheet: <span style={codeStyle}>Archivo → Compartir → Publicar en la web</span><br/>
    3. Select <span style={codeStyle}>Documento completo</span> → formato <span style={codeStyle}>Página web</span> → Publicar<br/>
    4. Copy the Google Sheet URL and paste it below<br/>
    5. For each client, enter the <span style={codeStyle}>gid</span> of its tab</div>
    <Field label="Google Sheet URL or ID"><input value={sheetId} onChange={e=>setSheetId(e.target.value)} placeholder="https://docs.google.com/spreadsheets/d/1abc123.../edit" style={inputStyle}/></Field>
    <div style={{fontSize:12,fontWeight:600,color:"#8892a4",marginBottom:10,textTransform:"uppercase",letterSpacing:"0.05em"}}>Tabs per Client — GID of each tab</div>
    <div style={infoStyle}>El <span style={codeStyle}>gid</span> appears in the URL: <span style={codeStyle}>...#gid=<strong>123456789</strong></span></div>
    {tabs.map((tab,idx)=>{const client=clients.find(c=>c.id===tab.clientId);return <div key={idx} style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
      <div style={{width:10,height:10,borderRadius:"50%",background:client?.color||"#666",flexShrink:0}}/>
      <span style={{fontSize:13,fontWeight:500,minWidth:160,color:"#f0f4f8"}}>{client?.name||tab.name}</span>
      <input value={tab.gid} onChange={e=>updateTab(idx,"gid",e.target.value)} placeholder="gid (ej: 0, 123456789)" style={{...inputStyle,flex:1,padding:"8px 12px",fontSize:13}}/>
    </div>;})}
    <div style={{display:"flex",justifyContent:"space-between",marginTop:24}}>
      <button onClick={onCancel} style={btnSecondary}>Cancel</button>
      <div style={{display:"flex",gap:10}}><button onClick={handleSave} style={btnSecondary}>Save Config</button><button onClick={handleSync} style={btnPrimary}>Save & Sync</button></div>
    </div>
  </div>;
}

function App() {
  const [flights,setFlights]=useState([]);
  const [clients,setClients]=useState(DEFAULT_CLIENTS);
  const [loaded,setLoaded]=useState(false);
  const [view,setView]=useState("week");
  const [selectedDate,setSelectedDate]=useState(todayStr());
  const [clientFilter,setClientFilter]=useState("all");
  const [showAddModal,setShowAddModal]=useState(false);
  const [showClientModal,setShowClientModal]=useState(false);
  const [editingFlight,setEditingFlight]=useState(null);
  const [showTable,setShowTable]=useState(false);
  const [showSheetsModal,setShowSheetsModal]=useState(false);
  const [sheetsConfig,setSheetsConfig]=useState(HARDCODED_SHEETS_CONFIG);
  const [syncing,setSyncing]=useState(false);
  const [lastSync,setLastSync]=useState(null);
  const [syncError,setSyncError]=useState(null);

  const syncFromSheets = useCallback(async (config) => {
    if(!config?.sheetId||!config?.tabs?.length)return;
    setSyncing(true); setSyncError(null);
    try {
      const allFlights=[];
      for(const tab of config.tabs){
        if(!tab.gid&&tab.gid!==0)continue;
        const url=buildSheetCSVUrl(config.sheetId,tab.gid);
        const resp=await fetch(url);
        if(!resp.ok)throw new Error(`Error tab ${tab.name}: ${resp.status}`);
        const text=await resp.text();
        const rows=parseCSV(text);
        allFlights.push(...rows.filter(r=>r.status!=="cancelled").map(r=>sheetRowToFlight(r,tab.clientId)));
      }
      setFlights(allFlights);
      setLastSync(new Date().toLocaleTimeString("en-US",{timeZone:"America/New_York",hour:"2-digit",minute:"2-digit"}));
    }catch(err){setSyncError(err.message);console.error(err);}
    finally{setSyncing(false);}
  },[]);

  useEffect(()=>{
    const c=loadData(CLIENTS_KEY,DEFAULT_CLIENTS);
    setClients(c);
    setLoaded(true);
    setTimeout(()=>syncFromSheets(HARDCODED_SHEETS_CONFIG),300);

    // Auto-refresh data from Google Sheets every 5 minutes
    const dataInterval = setInterval(()=>{
      console.log('[Auto-sync] Refreshing data from Sheets...');
      syncFromSheets(HARDCODED_SHEETS_CONFIG);
    }, 5 * 60 * 1000);

    // Full page reload every 60 minutes (picks up code changes from GitHub)
    const reloadInterval = setInterval(()=>{
      console.log('[Auto-reload] Reloading page...');
      window.location.reload();
    }, 60 * 60 * 1000);

    return ()=>{ clearInterval(dataInterval); clearInterval(reloadInterval); };
  },[syncFromSheets]);

  useEffect(()=>{if(loaded)saveData(CLIENTS_KEY,clients);},[clients,loaded]);

  const resetDemo=()=>{syncFromSheets(HARDCODED_SHEETS_CONFIG);setView("week");setSelectedDate(todayStr());setClientFilter("all");};

  const dateRange=useMemo(()=>{
    if(view==="day")return{start:selectedDate,end:selectedDate};
    if(view==="week")return getWeekRange(selectedDate);
    return getMonthRange(selectedDate);
  },[view,selectedDate]);
  const datesInRange=useMemo(()=>getDatesInRange(dateRange.start,dateRange.end),[dateRange]);
  const filteredFlights=useMemo(()=>flights.filter(f=>{
    const inRange=f.arrivalDate>=dateRange.start&&f.arrivalDate<=dateRange.end;
    const inClient=clientFilter==="all"||f.clientId===clientFilter;
    return inRange&&inClient;
  }),[flights,dateRange,clientFilter]);

  const navigate=(dir)=>{const d=new Date(selectedDate+"T12:00:00");if(view==="day")d.setDate(d.getDate()+dir);else if(view==="week")d.setDate(d.getDate()+dir*7);else d.setMonth(d.getMonth()+dir);setSelectedDate(d.toISOString().slice(0,10));};
  const addFlight=(flight)=>{setFlights(p=>[...p,{...flight,id:"f-"+Date.now()+Math.random().toString(36).slice(2,6)}]);setShowAddModal(false);};
  const updateFlight=(flight)=>{setFlights(p=>p.map(f=>f.id===flight.id?flight:f));setEditingFlight(null);};
  const deleteFlight=(id)=>{setFlights(p=>p.filter(f=>f.id!==id));setEditingFlight(null);};
  const getClient=(id)=>clients.find(c=>c.id===id)||{name:"?",color:"#666",short:"?"};

  const stats=useMemo(()=>{
    const today=todayStr();
    const todayFlights=flights.filter(f=>f.arrivalDate===today);
    const wr=getWeekRange(today);
    const weekFlights=flights.filter(f=>f.arrivalDate>=wr.start&&f.arrivalDate<=wr.end);
    const now=new Date();
    const inHangar=todayFlights.filter(f=>{const a=new Date(f.arrivalDate+"T"+f.arrivalTime);const d=new Date((f.departureDate||f.arrivalDate)+"T"+f.departureTime);return now>=a&&now<=d;});
    return{today:todayFlights.length,week:weekFlights.length,inHangar:inHangar.length};
  },[flights]);

  const headerLabel=useMemo(()=>{
    if(view==="day")return fmtDay(selectedDate+"T12:00:00");
    if(view==="week")return `${fmtDay(dateRange.start+"T12:00:00")} — ${fmtDay(dateRange.end+"T12:00:00")}`;
    return new Date(selectedDate+"T12:00:00").toLocaleDateString("en-US",{timeZone:MIAMI_TZ,month:"long",year:"numeric"});
  },[view,selectedDate,dateRange]);

  if(!loaded)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"#0d1117",color:"#8892a4"}}>Loading...</div>;

          <button onClick={()=>setShowSheetsModal(true)} style={{...btnSecondary,display:"flex",alignItems:"center",gap:6,padding:"8px 16px",fontSize:12,color:"#10B981",borderColor:"rgba(16,185,129,0.3)"}}>📊 Sheets ✓</button>
          <button onClick={resetDemo} style={{...btnSecondary,display:"flex",alignItems:"center",gap:6,padding:"8px 16px",fontSize:12,color:"#8892a4"}}>↻ Reload</button>
          <button onClick={()=>setShowClientModal(true)} style={{...btnSecondary,display:"flex",alignItems:"center",gap:6,padding:"8px 16px"}}><Icon name="settings" size={15}/> Clients</button>
          <button onClick={()=>{setEditingFlight(null);setShowAddModal(true);}} style={{...btnPrimary,display:"flex",alignItems:"center",gap:6,padding:"8px 16px"}}><Icon name="plus" size={15}/> New Flight</button>
        </div>
      </div>
      <div style={{display:"flex",gap:14,marginTop:20,flexWrap:"wrap"}}>
        {[{label:"Today",value:stats.today,icon:"plane",color:"#0EA5E9"},{label:"This Week",value:stats.week,icon:"calendar",color:"#8B5CF6"},{label:"On Bay Now",value:stats.inHangar,icon:"clock",color:"#10B981"}].map(s=>
          <div key={s.label} className="stat-card" style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"14px 20px",minWidth:140,transition:"all 0.2s",backdropFilter:"blur(8px)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><div style={{color:s.color}}><Icon name={s.icon} size={14}/></div><span style={{fontSize:11,color:"#8892a4",textTransform:"uppercase",letterSpacing:"0.06em",fontWeight:600}}>{s.label}</span></div>
            <span style={{fontSize:28,fontWeight:700,fontFamily:"'JetBrains Mono', monospace",color:s.color}}>{s.value}</span>
          </div>
        )}
      </div>
    </div>

    {/* Toolbar */}
    <div style={{padding:"16px 28px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12,borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(255,255,255,0.01)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <button onClick={()=>navigate(-1)} style={{...btnSecondary,padding:"7px 10px"}}><Icon name="chevLeft" size={16}/></button>
        <button onClick={()=>setSelectedDate(todayStr())} style={{...btnSecondary,padding:"7px 14px",fontSize:13}}>Today</button>
        <button onClick={()=>navigate(1)} style={{...btnSecondary,padding:"7px 10px"}}><Icon name="chevRight" size={16}/></button>
        <span style={{fontSize:15,fontWeight:600,marginLeft:8,textTransform:"capitalize"}}>{headerLabel}</span>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{display:"flex",background:"rgba(255,255,255,0.04)",borderRadius:10,border:"1px solid rgba(255,255,255,0.06)",overflow:"hidden"}}>
          {["day","week","month"].map(v=><button key={v} className="view-btn" onClick={()=>setView(v)} style={{padding:"7px 16px",border:"none",fontSize:13,fontWeight:600,cursor:"pointer",background:view===v?"rgba(14,165,233,0.2)":"transparent",color:view===v?"#0EA5E9":"#8892a4",fontFamily:"'DM Sans', sans-serif"}}>{v==="day"?"Day":v==="week"?"Week":"Month"}</button>)}
        </div>
        <button onClick={()=>setShowTable(!showTable)} style={{...btnSecondary,padding:"7px 10px"}}><Icon name={showTable?"grid":"list"} size={16}/></button>
        <select value={clientFilter} onChange={e=>setClientFilter(e.target.value)} style={{...inputStyle,width:"auto",minWidth:150,padding:"7px 32px 7px 12px",fontSize:13}}>
          <option value="all">All Clients</option>
          {clients.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
        </select>
        <input type="date" value={selectedDate} onChange={e=>setSelectedDate(e.target.value)} style={{...inputStyle,width:"auto",padding:"7px 12px",fontSize:13}}/>
      </div>
    </div>

    {/* Content */}
    <div style={{padding:"20px 28px"}}>
      {filteredFlights.length===0?
        <div style={{textAlign:"center",padding:"60px 20px",color:"#8892a4"}}><Icon name="plane" size={48}/><p style={{fontSize:16,marginTop:16}}>No flights scheduled for this period</p><button onClick={()=>setShowAddModal(true)} style={{...btnPrimary,marginTop:12}}>Add Flight</button></div>
      :showTable?
        <div style={{overflowX:"auto"}}>{datesInRange.map(date=>{
          const dayFlights=filteredFlights.filter(f=>f.arrivalDate===date).sort((a,b)=>a.arrivalTime.localeCompare(b.arrivalTime));
          if(dayFlights.length===0)return null;
          return <div key={date} style={{marginBottom:24}}>
            {view!=="day"&&<h3 style={{fontSize:13,fontWeight:600,color:"#8892a4",marginBottom:10,textTransform:"capitalize"}}>{fmtDay(date+"T12:00:00")}</h3>}
            <div style={{borderRadius:14,border:"1px solid rgba(255,255,255,0.06)",overflow:"hidden"}}>
              <div style={{display:"grid",gridTemplateColumns:"60px 1fr 110px 110px 130px 100px 60px",padding:"10px 16px",background:"rgba(255,255,255,0.03)",fontSize:11,fontWeight:600,color:"#8892a4",textTransform:"uppercase",letterSpacing:"0.05em",gap:12}}>
                <span>Client</span><span>Tail</span><span>ETA</span><span>ETD</span><span>Service</span><span>Status</span><span></span>
              </div>
              {dayFlights.map(f=>{const cl=getClient(f.clientId);const svc=SERVICE_TYPES.find(s=>s.id===f.serviceType);
                return <div key={f.id} className="flight-row" style={{display:"grid",gridTemplateColumns:"60px 1fr 110px 110px 130px 100px 60px",padding:"12px 16px",borderTop:"1px solid rgba(255,255,255,0.04)",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>{setEditingFlight(f);setShowAddModal(true);}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:8,height:8,borderRadius:"50%",background:cl.color,flexShrink:0}}/><span style={{fontSize:12,fontWeight:600,color:cl.color}}>{cl.short}</span></div>
                  <span style={{fontSize:14,fontWeight:600,fontFamily:"'JetBrains Mono', monospace"}}>{f.tailNumber}</span>
                  <span style={{fontSize:14,fontFamily:"'JetBrains Mono', monospace",color:"#10B981"}}>{f.arrivalTime}</span>
                  <span style={{fontSize:14,fontFamily:"'JetBrains Mono', monospace",color:"#F97316"}}>{f.departureTime}</span>
                  <span style={{fontSize:12,color:"#c1c9d6"}}>{svc?`${svc.label}`:f.serviceType}</span>
                  <StatusBadge flight={f}/>
                  <button onClick={e=>{e.stopPropagation();deleteFlight(f.id);}} style={{background:"none",border:"none",color:"#8892a4",cursor:"pointer",padding:4,opacity:0.5}}><Icon name="trash" size={14}/></button>
                </div>;
              })}
            </div>
          </div>;
        })}</div>
      :
        <div style={{overflowX:"auto"}}>{datesInRange.map(date=>{
          const dayFlights=filteredFlights.filter(f=>f.arrivalDate===date).sort((a,b)=>a.arrivalTime.localeCompare(b.arrivalTime));
          if(dayFlights.length===0&&view==="day")return <div key={date} style={{textAlign:"center",padding:40,color:"#8892a4"}}>No flights scheduled</div>;
          if(dayFlights.length===0)return null;
          return <div key={date} style={{marginBottom:28}}>
            {view!=="day"&&<h3 style={{fontSize:13,fontWeight:600,color:"#8892a4",marginBottom:10,textTransform:"capitalize"}}>{fmtDay(date+"T12:00:00")} — {dayFlights.length} flight{dayFlights.length>1?"s":""}</h3>}
            <div style={{position:"relative",background:"rgba(255,255,255,0.02)",borderRadius:14,border:"1px solid rgba(255,255,255,0.08)",padding:"12px 16px",minHeight:60,backgroundImage:"repeating-linear-gradient(90deg, transparent, transparent calc(100%/24 - 1px), rgba(255,255,255,0.03) calc(100%/24 - 1px), rgba(255,255,255,0.03) calc(100%/24))"}}>
              <div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.06)",background:"rgba(255,255,255,0.01)",paddingBottom:6,marginBottom:8}}>
                {Array.from({length:24},(_,i)=><div key={i} style={{flex:1,fontSize:10,color:i%6===0?"#8892a4":"#444d5e",textAlign:"center",fontFamily:"'JetBrains Mono', monospace",fontWeight:i%6===0?600:400,borderLeft:"1px solid "+(i%6===0?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.03)"),paddingTop:4}}>{String(i).padStart(2,"0")}:00</div>)}
              </div>
              {dayFlights.map(f=>{const cl=getClient(f.clientId);const arrMin=timeToMinutes(f.arrivalTime);const depMin=timeToMinutes(f.departureTime);const totalMin=depMin>arrMin?depMin-arrMin:(1440-arrMin+depMin);const leftPct=(arrMin/1440)*100;const widthPct=Math.max((totalMin/1440)*100,2);
                return <div key={f.id} style={{position:"relative",height:36,marginBottom:4,cursor:"pointer"}} onClick={()=>{setEditingFlight(f);setShowAddModal(true);}}>
                  <div style={{position:"absolute",left:leftPct+"%",width:widthPct+"%",height:30,borderRadius:8,background:cl.color+"44",border:`2px solid ${cl.color}aa`,boxShadow:`0 0 12px ${cl.color}33`,display:"flex",alignItems:"center",padding:"0 10px",gap:8,overflow:"hidden",transition:"all 0.2s"}}>
                    <span style={{fontSize:11,fontWeight:700,color:cl.color,whiteSpace:"nowrap"}}>{cl.short}</span>
                    <span style={{fontSize:12,fontWeight:700,fontFamily:"'JetBrains Mono', monospace",whiteSpace:"nowrap",color:"#fff",textShadow:"0 1px 4px rgba(0,0,0,0.4)"}}>{f.tailNumber}</span>
                    <span style={{fontSize:10,color:"#c1c9d6",whiteSpace:"nowrap",marginLeft:"auto",fontWeight:500}}>{f.arrivalTime}→{f.departureTime}</span>
                  </div>
                </div>;
              })}
            </div>
          </div>;
        })}</div>
      }
    </div>

    {syncError&&<div style={{margin:"0 28px",padding:"10px 16px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}><span style={{fontSize:13,color:"#EF4444"}}>Error: {syncError}</span><button onClick={()=>setSyncError(null)} style={{background:"none",border:"none",color:"#EF4444",cursor:"pointer"}}><Icon name="x" size={14}/></button></div>}

    <Modal open={showAddModal} onClose={()=>{setShowAddModal(false);setEditingFlight(null);}} title={editingFlight?"Edit Flight":"New Flight"}>
      <FlightForm clients={clients} initial={editingFlight} onSave={editingFlight?updateFlight:addFlight} onDelete={editingFlight?()=>deleteFlight(editingFlight.id):null} onCancel={()=>{setShowAddModal(false);setEditingFlight(null);}} selectedDate={selectedDate}/>
    </Modal>
    <Modal open={showClientModal} onClose={()=>setShowClientModal(false)} title="Client Management" wide><ClientManager clients={clients} setClients={setClients}/></Modal>
    <Modal open={showSheetsModal} onClose={()=>setShowSheetsModal(false)} title="📊 Connect Google Sheets" wide>
      <SheetsConfigPanel config={sheetsConfig} clients={clients} onSave={cfg=>{setSheetsConfig(cfg);setShowSheetsModal(false);}} onSync={cfg=>{setSheetsConfig(cfg);syncFromSheets(cfg);setShowSheetsModal(false);}} onCancel={()=>setShowSheetsModal(false)}/>
    </Modal>
  </div>;
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
